version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: mailforge_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: mailforge
      MYSQL_USER: mailforge
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - '127.0.0.1:3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'mailforge', '--password=secret']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mailforge_redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mailforge_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: mailforge_api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:172.18.0.1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://mailforge:${DB_PASSWORD:-secret}@db:3306/mailforge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: ${APP_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 3001
      UPLOAD_DIR: /app/uploads
    ports:
      - '127.0.0.1:3001:3001'
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_URL: ${APP_URL:-http://localhost:3001}
    container_name: mailforge_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '127.0.0.1:3000:80'

  webmail:
    image: roundcube/roundcubemail:latest
    container_name: mailforge_webmail
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:172.18.0.1"
    environment:
      ROUNDCUBEMAIL_DEFAULT_HOST: host.docker.internal
      ROUNDCUBEMAIL_DEFAULT_PORT: 143
      ROUNDCUBEMAIL_SMTP_SERVER: host.docker.internal
      ROUNDCUBEMAIL_SMTP_PORT: 587
      ROUNDCUBEMAIL_SMTP_USER: '%u'
      ROUNDCUBEMAIL_SMTP_PASS: '%p'
      ROUNDCUBEMAIL_SMTP_AUTH_TYPE: LOGIN
      ROUNDCUBEMAIL_DB_TYPE: sqlite
      ROUNDCUBEMAIL_SKIN: elastic
      ROUNDCUBEMAIL_PLUGINS: archive,zipdownload,markasjunk,mailforge_style
      ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE: 25M
    volumes:
      - webmail_data:/var/roundcube/db
      - webmail_config:/var/roundcube/config
      - ./docker/webmail/mailforge_style:/var/www/html/plugins/mailforge_style
    ports:
      - '127.0.0.1:8025:80'

volumes:
  db_data:
  redis_data:
  minio_data:
  uploads:
  webmail_data:
  webmail_config:
